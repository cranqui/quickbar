<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'">
  <title>QuickBar</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      background: transparent;
      overflow: hidden;
      -webkit-app-region: no-drag;
      user-select: none;
    }

    /* Inset 6px on all sides so the macOS shadow is visible around the card */
    .backdrop {
      position: fixed;
      top: 6px;
      left: 6px;
      right: 6px;
      bottom: 6px;
      background: #ffffff;
      border-radius: 14px;
      border: 1px solid rgba(0, 0, 0, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden; /* clips .container background to rounded corners */
    }

    /* Input area — slightly darker than the hints bar, Raycast style */
    .container {
      display: flex;
      align-items: center;
      flex: 1;
      padding: 0 18px;
      gap: 12px;
      background: #F0EFED;
    }

    .prompt-icon {
      color: #DA7756;
      font-size: 30px;
      flex-shrink: 0;
      transition: color 0.15s ease;
    }

    .input-wrapper {
      flex: 1;
    }

    #quick-input {
      width: 100%;
      background: transparent;
      border: none;
      outline: none;
      color: #3a3a3a;
      font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
      font-size: 17px;
      font-weight: 400;
      letter-spacing: -0.01em;
      caret-color: #DA7756;
    }

    #quick-input::placeholder {
      color: rgba(0, 0, 0, 0.28);
    }

    /* Hints bar — white, as-is */
    .statusbar {
      height: 32px;
      background: #ffffff;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
      display: flex;
      align-items: center;
      padding: 0 18px;
      gap: 16px;
    }

    .statusbar-hint {
      font-size: 13px;
      font-weight: 500;
      color: #3a3a3a;
      letter-spacing: 0.01em;
    }

    .statusbar-hint kbd {
      font-family: inherit;
      background: rgba(0, 0, 0, 0.07);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 13px;
    }

    /* Results list */
    .results {
      max-height: 352px; /* 8 items × 44px */
      overflow-y: auto;
      background: #ffffff;
    }

    .result-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 0 18px;
      height: 44px;
      cursor: pointer;
      transition: background 0.08s ease;
    }

    .result-item.selected {
      background: rgba(0, 0, 0, 0.05);
    }

    .result-icon {
      width: 24px;
      height: 24px;
      flex-shrink: 0;
      border-radius: 5px;
      object-fit: contain;
    }

    .result-icon-emoji {
      font-size: 18px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .result-subtitle {
      font-size: 12px;
      color: #999;
      margin-left: auto;
      white-space: nowrap;
      font-weight: 400;
    }

    .result-name {
      font-size: 15px;
      font-weight: 400;
      color: #3a3a3a;
      letter-spacing: -0.01em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .inline-result-icon {
      font-size: 18px;
      width: 24px;
      text-align: center;
      flex-shrink: 0;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      .backdrop {
        background: #1e1e1e;
        border-color: rgba(255, 255, 255, 0.08);
      }
      .container {
        background: #2a2a2a;
      }
      #quick-input {
        color: #e0e0e0;
      }
      #quick-input::placeholder {
        color: rgba(255, 255, 255, 0.28);
      }
      .statusbar {
        background: #1e1e1e;
        border-top-color: rgba(255, 255, 255, 0.06);
      }
      .statusbar-hint {
        color: #e0e0e0;
      }
      .statusbar-hint kbd {
        background: rgba(255, 255, 255, 0.1);
      }
      .results {
        background: #1e1e1e;
      }
      .result-item.selected {
        background: rgba(255, 255, 255, 0.08);
      }
      .result-name {
        color: #e0e0e0;
      }
      .result-subtitle {
        color: #777;
      }
    }
  </style>
</head>
<body>
  <div class="backdrop">
    <div class="container">
      <span class="prompt-icon">▸</span>
      <div class="input-wrapper">
        <input
          type="text"
          id="quick-input"
          placeholder="Search apps, calc, 3600 cop to usd, /ai, /do…"
          spellcheck="false"
          autocomplete="off"
          autofocus
        />
      </div>
    </div>
    <div class="results" id="results" style="display:none"></div>
    <div class="statusbar">
      <span class="statusbar-hint"><kbd>↵</kbd> open / copy</span>
      <span class="statusbar-hint"><kbd>/ai</kbd> command</span>
      <span class="statusbar-hint"><kbd>/do</kbd> task</span>
      <span class="statusbar-hint"><kbd>esc</kbd> dismiss</span>
    </div>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
